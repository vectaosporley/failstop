# Reportero de failstop: manda stats (estrellas, forks, vistas, clones, cafecitos)
# al Telegram del mantenedor, dos veces al dia. Corre en los servidores de GitHub,
# asi que no depende de que ninguna PC este prendida.
#
# Los secretos TELEGRAM_BOT_TOKEN y TELEGRAM_CHAT_ID se cargan en:
#   Settings -> Secrets and variables -> Actions -> New repository secret
# Nada sensible vive en este archivo.
name: reportero

on:
  schedule:
    # GitHub usa UTC. Argentina es UTC-3.
    #
    # MEDIDO el 2026-07-17: con "0 12 * * *" la corrida NO disparo. Dos horas despues del
    # horario seguia sin existir (ni siquiera como 'queued'). El scheduler de Actions es de
    # MEJOR ESFUERZO, no una garantia, y el minuto 0 es el mas congestionado del planeta:
    # todo el mundo agenda en punto. GitHub mismo recomienda evitarlo.
    # Por eso: minuto 23. No tiene nada de magico, solo que casi nadie lo elige.
    - cron: "23 12 * * *"   # 12:23 UTC = 09:23 en Argentina
    - cron: "23 0 * * *"    # 00:23 UTC = 21:23 en Argentina
  workflow_dispatch: {}     # boton "Run workflow" para probar a mano

permissions:
  contents: read
  # Ojo: NO existe un permiso "administration" para el GITHUB_TOKEN de Actions.
  # La API de trafico (vistas/clones) pide acceso de push/admin al repo, y el token
  # efimero de Actions puede no alcanzar. Si no alcanza, esas dos lineas salen
  # "(sin dato)" y el resto del reporte se manda igual. Medido, no supuesto.

concurrency:
  group: reportero
  cancel-in-progress: false

jobs:
  reportar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Restaura el estado del reporte anterior para poder mostrar la variacion (+N).
      # Es best-effort: si no hay cache, el reporte sale igual, solo sin el "(+N)".
      - name: restaurar estado
        uses: actions/cache@v4
        with:
          path: .github/reportero/estado.json
          key: reportero-estado-${{ github.run_id }}
          restore-keys: |
            reportero-estado-

      - name: correr reportero
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # GH_PAT es una llave fina (solo failstop, solo lectura) que SI puede leer
          # el trafico. Si no esta cargada, cae al token de Actions y vistas/clones
          # salen "(sin dato)" -- el resto del reporte se manda igual.
          GH_API_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: python .github/reportero/reportero_cloud.py
